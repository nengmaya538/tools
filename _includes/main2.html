textarea { width:100%; height:200px; margin-bottom:10px; }
button { padding:8px 15px; margin-right:5px; cursor:pointer; }
.nnn { padding:8px; max-width:100%; background-color:#ddd;}
pre { background:#f4f4f4; padding:15px; white-space:pre-wrap; }
</style>

<h4>Auto Tambah Categories + Split 15 Bagian</h4>
<p>ubah daftar menjadi 15 bagian berapapun jumlah barisnya</p>
<p>dengan format:</p>
<pre>
categories: [baris 01,baris 02,dast]
</pre><br />
<div class="nnn">
<textarea id="input" placeholder="Paste 1000 baris di sini..."></textarea>
<br><center>
<button onclick="generate()">Generate</button><br /><br />
<button onclick="copyResult()">Copy Hasil</button>
</center>
<h3>Hasil:</h3>
<pre id="output"></pre>
<div>
<script>
function generate() {
  const raw = document.getElementById("input").value;

  const lines = raw
    .split("\n")
    .map(l => l.trim())
    .filter(l => l !== "");

  const parts = 15;
  const baseSize = Math.floor(lines.length / parts);
  const remainder = lines.length % parts;

  let start = 0;
  let result = "";

  for (let i = 0; i < parts; i++) {
    const extra = i < remainder ? 1 : 0;
    const end = start + baseSize + extra;
    const chunk = lines.slice(start, end);

    
    result += `categories: [${chunk.join(",")}]\n\n`;

    start = end;
  }

  document.getElementById("output").textContent = result;
}

function copyResult() {
  const text = document.getElementById("output").textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert("Hasil berhasil di-copy!");
  });
}
</script>
<br />
