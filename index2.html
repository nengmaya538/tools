<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mass Page Generator</title>

<style>
body{font-family:Arial}
textarea{width:100%;height:220px;margin-bottom:10px}
input{width:100%;padding:6px;margin-bottom:10px}
button{padding:10px 20px;cursor:pointer}
.box{background:#ddd;padding:15px;max-width:900px;margin:auto}
#status{margin-top:10px;font-weight:bold}
#progress{height:10px;background:#aaa;margin-top:10px}
#bar{height:10px;background:#28a;width:0%}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>
<body>

<div class="box">

<h3>Mass Page Generator</h3>

<label>Judul dasar</label>
<input id="titleBase" placeholder="contoh: artikel">

<label>Categories</label>
<input id="categoryBase" placeholder="contoh: seo">

<label>Nomor mulai</label>
<input id="startNum" type="number" value="1">

<label>Jumlah split</label>
<input id="parts" type="number" value="1000">

<label>Input text</label>
<textarea id="input"></textarea>

<center>
<button onclick="generate()">Generate ZIP</button>
</center>

<div id="status"></div>

<div id="progress">
<div id="bar"></div>
</div>

</div>

<script>

function pad(n){
return n.toString().padStart(2,"0");
}

function slug(text){
return text
.toLowerCase()
.replace(/[^a-z0-9]+/g,"-")
.replace(/^-+|-+$/g,"");
}

async function generate(){

const status=document.getElementById("status");
const bar=document.getElementById("bar");

status.innerText="Preparing...";

const raw=document.getElementById("input").value;

if(!raw){
status.innerText="Input kosong";
return;
}

const lines=raw.split("\n");

const parts=parseInt(document.getElementById("parts").value);

if(parts<1){
status.innerText="Jumlah split tidak valid";
return;
}

const titleBase=document.getElementById("titleBase").value || "judul";

const categoryBase=document.getElementById("categoryBase").value || "artikel";

const startNum=parseInt(document.getElementById("startNum").value) || 1;

const baseSize=Math.floor(lines.length/parts);
const remainder=lines.length%parts;

let start=0;

let zip=new JSZip();

for(let i=0;i<parts;i++){

const extra=i<remainder?1:0;

const end=start+baseSize+extra;

const chunk=lines.slice(start,end);

start=end;

let number=startNum+i;

let title=titleBase+pad(number);

let filename=slug(title)+".html";

let content=
`---
layout: c
title: "${title}"
categories: [${categoryBase}]
---
${chunk.join("\n")}
`;

zip.file(filename,content);

if(i%50==0){

let percent=Math.floor((i/parts)*100);

bar.style.width=percent+"%";

status.innerText=`Generating ${i} / ${parts}`;

await new Promise(r=>setTimeout(r,0));

}

}

status.innerText="Creating ZIP...";

const blob=await zip.generateAsync({
type:"blob",
compression:"STORE"
});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="mass-pages.zip";

a.click();

bar.style.width="100%";

status.innerText="Selesai ✔";

}

</script>

</body>
</html>
