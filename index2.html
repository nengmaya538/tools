<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Split Text Generator</title>

<style>
body{font-family:Arial}
textarea{width:100%;height:220px;margin-bottom:10px}
input{width:100%;padding:6px;margin-bottom:10px}
button{padding:10px 20px;cursor:pointer}
.box{background:#ddd;padding:15px;max-width:900px;margin:auto}
#status{margin-top:10px;font-weight:bold}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>
<body>

<div class="box">

<h3>Split Text → HTML → ZIP</h3>

<label>Judul dasar</label>
<input id="titleBase" placeholder="Contoh: Tutorial SEO">

<label>Jumlah File / Split</label>
<input id="parts" type="number" value="15" min="1">

<label>Input Text</label>
<textarea id="input" placeholder="Paste text di sini..."></textarea>

<center>
<button onclick="generate()">Generate ZIP</button>
</center>

<div id="status"></div>

</div>

<script>

function generate(){

const status=document.getElementById("status");
status.innerText="Memproses...";

const raw=document.getElementById("input").value;

if(!raw){
status.innerText="Input kosong.";
return;
}

const lines=raw.split("\n");

const parts=parseInt(document.getElementById("parts").value);

if(!parts || parts<1){
status.innerText="Jumlah split tidak valid.";
return;
}

const baseSize=Math.floor(lines.length/parts);
const remainder=lines.length%parts;

const titleBase=document.getElementById("titleBase").value;

let start=0;

let zip=new JSZip();

for(let i=0;i<parts;i++){

const extra=i<remainder?1:0;
const end=start+baseSize+extra;

const chunk=lines.slice(start,end);

start=end;

let title;

if(titleBase){
title=titleBase+" "+(i+1);
}else{
title="Judul "+(i+1);
}

let content=
`---
layout: c
title: "${title}"
---
${chunk.join("\n")}
`;

zip.file((i+1)+".html",content);

}

zip.generateAsync({type:"blob"}).then(function(content){

const a=document.createElement("a");

a.href=URL.createObjectURL(content);
a.download="hasil_split.zip";

a.click();

status.innerText="ZIP berhasil dibuat.";

}).catch(function(e){

status.innerText="Error: "+e;

});

}

</script>

</body>
</html>
