<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UL LI Generator PRO MULTI DOMAIN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { font-family:Arial; padding:10px; }
textarea { width:100%; height:200px; margin-bottom:10px; }
button { padding:10px 15px; cursor:pointer; }
.nnn { padding:10px; background:#ddd;}
pre { background:#f4f4f4; padding:15px; white-space:pre-wrap; }
.info {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-left:4px solid #333;
  font-size:14px;
}
input, select { padding:6px; margin:5px 0; width:100%; }
</style>
</head>

<body>

<main>

<h2>UL LI Generator PRO (MULTI DOMAIN)</h2>

<div class="info">
✔ Support banyak domain (1 baris = 1 domain)<br>
✔ Domain akan diputar otomatis<br>
✔ Semua bahasa tetap aman<br>
✔ Filter min 5 karakter aktif
</div>

<div class="nnn">

<textarea id="domain" placeholder="Contoh:
https://site1.com
https://site2.com
/categories"></textarea>

<textarea id="input" placeholder="Paste banyak baris di sini..."></textarea>

<select id="mode">
  <option value="byParts">Bagi jumlah bagian</option>
  <option value="bySize">Item per bagian</option>
</select>

<input type="number" id="number" placeholder="contoh: 10 atau 1000">

<br><br>
<button onclick="generate()">🚀 Generate + Download ZIP</button>

<h3>Preview (sebagian):</h3>
<pre id="output"></pre>

</div>

<script>

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[m]));
}

function removeControlChars(str) {
  return str.replace(/[\u0000-\u001F\u007F]/g, "");
}

function cleanText(text) {
  return removeControlChars(text)
    .replace(/\s+/g, " ")
    .trim();
}

function normalizeQuery(text) {
  return text.toLowerCase().trim().replace(/\s+/g, " ");
}

async function generate() {

  const raw = document.getElementById("input").value;
  const mode = document.getElementById("mode").value;
  const num = parseInt(document.getElementById("number").value);

  // ✅ MULTI DOMAIN
  let domains = document.getElementById("domain").value
    .split("\n")
    .map(d => d.trim())
    .filter(d => d !== "");

  if (domains.length === 0) domains = ["/categories"];

  if (!num || num <= 0) return alert("Isi jumlah!");

  // ✅ FILTER MIN 5 KARAKTER (SEMUA BAHASA)
  const lines = raw
    .split("\n")
    .map(cleanText)
    .filter(l => {
      const count = l.replace(/[^\p{L}\p{N}]/gu, "").length;
      return l !== "" && count >= 5;
    });

  let chunks = [];

  if (mode === "byParts") {
    const base = Math.floor(lines.length / num);
    const rem = lines.length % num;
    let start = 0;

    for (let i = 0; i < num; i++) {
      const extra = i < rem ? 1 : 0;
      const end = start + base + extra;
      chunks.push(lines.slice(start, end));
      start = end;
    }

  } else {
    for (let i = 0; i < lines.length; i += num) {
      chunks.push(lines.slice(i, i + num));
    }
  }

  const zip = new JSZip();
  let preview = "";
  let globalIndex = 0;

  chunks.forEach((chunk, i) => {
    if (!chunk.length) return;

    let content = '<ul class="spo">\n';

    chunk.forEach(line => {
      const query = normalizeQuery(line);

      // 🔥 ROTASI DOMAIN
      const domain = domains[globalIndex % domains.length];

      const url = domain + "/?q=" + encodeURIComponent(query);

      content += '<li><a href="' + url + '">' + escapeHTML(line) + '</a></li>\n';

      globalIndex++;
    });

    content += '</ul>';

    zip.file(`part-${i+1}.html`, content);

    if (i < 2) preview += content + "\n\n";
  });

  document.getElementById("output").textContent = preview;

  const blob = await zip.generateAsync({ type: "blob" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "hasil-ul-multidomain.zip";
  link.click();
}

</script>

</main>
</body>
</html>
